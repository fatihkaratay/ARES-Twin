services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ares-twin-postgres
    environment:
      POSTGRES_USER: ares
      POSTGRES_PASSWORD: ares
      POSTGRES_DB: ares_twin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ares -d ares_twin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
